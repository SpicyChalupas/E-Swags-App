    <div class="admin-container">
      <h1>Create Your Account</h1>

      <section class="admin-section">
        <h2>Account Details</h2>
        <div class="form-box">
          <form id="create-account-form">
            <div class="form-group">
              <label for="username">Username:</label>
              <input type="text" id="username" name="username" required placeholder="e.g., john_doe">
            </div>

            <div class="form-group">
              <label for="displayName">Display Name:</label>
              <input type="text" id="displayName" name="displayName" required placeholder="e.g., John Doe">
            </div>

            <div class="form-group">
              <label for="email">Email (lewisu.edu):</label>
              <input type="email" id="email" name="email" required placeholder="e.g., jdoe@lewisu.edu" pattern=".+@lewisu\.edu" title="Use your @lewisu.edu email">
            </div>

            <div class="form-group">
              <label for="password">Password:</label>
              <input type="password" id="password" name="password" required placeholder="Enter a strong password">
            </div>

            <!-- Visible but non-editable fields for transparency + hidden inputs for submission -->
            <div class="form-group">
              <label for="role-display">Role</label>
              <input type="text" id="role-display" value="Student" disabled readonly>
            </div>

            <div class="form-group">
              <label for="credits-display">Initial Credits</label>
              <input type="text" id="credits-display" value="0" disabled readonly>
            </div>

            <!-- Hidden fixed fields per PTG-116 (submitted values) -->
            <input type="hidden" id="role" name="role" value="student">
            <input type="hidden" id="credits" name="credits" value="0">

            <button type="submit" class="btn-primary">Create Account</button>
            <span id="create-message" class="message"></span>
          </form>
        </div>
      </section>
    </div>
